<ion-card>
  <ion-card-header>
    <ion-card-title>{{ transaccion.descripcion || categoriaInfo?.label }}</ion-card-title>
    <ion-card-subtitle>{{ transaccion.fecha | dateFormat }}</ion-card-subtitle>
  </ion-card-header>
  <ion-card-content>
    <p>Tipo: {{ transaccion.tipo | titlecase }}</p>
    <p>Categoría: {{ categoriaInfo?.label }}</p>
    <p>Monto: {{ transaccion.monto | currencyFormat }}</p>
    <ion-img *ngIf="transaccion.comprobante" [src]="transaccion.comprobante"></ion-img>
  </ion-card-content>
  <ion-card-footer>
    <ion-button color="primary" (click)="edit()">Editar</ion-button>
    <ion-button color="danger" (click)="delete()">Eliminar</ion-button>
  </ion-card-footer>
</ion-card>
