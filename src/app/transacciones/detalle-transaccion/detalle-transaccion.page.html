<ion-header>
  <ion-toolbar>
    <ion-title>Detalle</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="editar()"><ion-icon name="create-outline"></ion-icon></ion-button>
      <ion-button color="danger" (click)="eliminar()"><ion-icon name="trash-outline"></ion-icon></ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" *ngIf="transaccion">
  <app-transaction-detail [transaccion]="transaccion"></app-transaction-detail>
</ion-content>
